name: Validate project

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Compile collector
        run: python -m compileall -q collector
      - name: Check web JavaScript syntax
        run: node --check app.js
      - name: Verify bid number and detail URL
        working-directory: collector
        run: |
          python - <<'PY'
          from normalizer import normalize

          bid = normalize({
              "bidNtceNo": "R26BK01624350",
              "bidNtceOrd": "000",
              "bidNtceNm": "고성능 컴퓨터서버 구매",
          })
          assert bid["bid_no"] == "R26BK01624350"
          assert bid["bid_order"] == "000"
          assert bid["source_url"] == (
              "https://www.g2b.go.kr/link/PNPE027_01/single/"
              "?bidPbancNo=R26BK01624350&bidPbancOrd=000"
          )

          combined = normalize({
              "bidNtceNo": "R26BK01624350-001",
              "bidNtceNm": "정정공고",
          })
          assert combined["bid_no"] == "R26BK01624350"
          assert combined["bid_order"] == "001"

          accurate = normalize({
              "bidNtceNo": "R26BK01632544",
              "bidNtceOrd": "000",
              "bidNtceNm": "용인예술과학대학교 조립형 데스크톱컴퓨터 구매",
              "asignBdgtAmt": "64000000",
              "presmptPrce": "58181818",
              "bidNtceDt": "2026-07-14 15:07:02",
              "bidClseDt": "202607231000",
              "opengDt": "2026/07/23 11:00:00",
          })
          assert accurate["allocated_budget"] == 64000000
          assert accurate["estimated_amount"] == 58181818
          assert accurate["posted_at"] == "2026-07-14T15:07:02+09:00"
          assert accurate["deadline_at"] == "2026-07-23T10:00:00+09:00"
          assert accurate["opening_at"] == "2026-07-23T11:00:00+09:00"
          PY
      - name: Check required web files
        shell: bash
        run: |
          test -f index.html
          test -f app.js
          test -f styles.css
          ! grep -q 'sourceUrl: "https://www.g2b.go.kr/"' app.js
          grep -q 'g2bDetailUrl(bid.bidNo)' app.js
          ! grep -q 'demoBids' app.js
